services:
  postgres:
    image: postgres:16-alpine
    container_name: caresync-db
    environment:
      POSTGRES_DB: caresync
      POSTGRES_USER: caresync
      POSTGRES_PASSWORD: caresync123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caresync"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: caresync-api
    environment:
      DATABASE_URL: postgresql://caresync:caresync123@postgres:5432/caresync
      JWT_SECRET: caresync-dev-secret-change-in-production
      JWT_REFRESH_SECRET: caresync-dev-refresh-secret-change-in-production
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/apps/api/uploads
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: caresync-web
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata:
  uploads:
