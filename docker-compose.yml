services:
  postgres:
    image: postgres:16-alpine
    container_name: caresync-db
    environment:
      POSTGRES_DB: caresync
      POSTGRES_USER: caresync
      POSTGRES_PASSWORD: caresync123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
