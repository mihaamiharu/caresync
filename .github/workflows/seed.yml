name: Seed Database

on:
  workflow_dispatch:

jobs:
  seed:
    name: Seed Database
    runs-on: ubuntu-latest
    environment: staging

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: caresync
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set environment
        run: cp apps/api/.env.example apps/api/.env

      - name: Run migrations
        run: pnpm --filter @caresync/api db:migrate

      - name: Seed database
        run: pnpm --filter @caresync/api db:seed
